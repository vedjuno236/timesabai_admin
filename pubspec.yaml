name: admin_timesabai
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.2

dependencies:

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: 4.0.3
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  flutter_spinkit: ^5.2.1
  adaptive_dialog: ^2.2.1+2
  flutter_speed_dial: ^7.0.0
  loading_animation_widget: ^1.3.0
  intl: ^0.19.0
  simple_month_year_picker: ^1.0.5
  flutter_launcher_icons: ^0.10.0
  status_alert: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/play_store.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/play_store.png"



flutter:


  uses-material-design: true


  assets:
    - assets/
    - assets/images/
    - assets/icons/play_store.png


